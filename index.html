<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latein-Konjugationstrainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
  <h1>Latein-Konjugationstrainer</h1>
  <p class="subtitle">Übe Formen aus 25 Verben: Indikativ, Konjunktiv, Aktiv und Passiv.</p>

  <section class="card controls">
    <label for="modus">Modus</label>
    <select id="modus">
      <option value="indikativ">Indikativ</option>
      <option value="konjunktiv">Konjunktiv</option>
    </select>

    <label for="tempus">Tempus</label>
    <select id="tempus">
      <option value="praesens">Präsens</option>
      <option value="imperfekt">Imperfekt</option>
      <option value="perfekt">Perfekt</option>
      <option value="plusquamperfekt">Plusquamperfekt</option>
      <option value="futur1">Futur I</option>
    </select>

    <label for="genus">Genus verbi</label>
    <select id="genus">
      <option value="aktiv">Aktiv</option>
      <option value="passiv">Passiv</option>
    </select>
  </section>

  <button id="newTaskBtn" class="primary-button" type="button">Neue Aufgabe</button>

  <section class="card exercise-card">
    <div id="task" class="task">Klicke auf „Neue Aufgabe“.</div>

    <label for="answer" class="visually-hidden">Antwort</label>
    <input id="answer" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="Antwort eingeben">

    <button id="checkBtn" type="button">Prüfen</button>

    <div id="feedback" aria-live="polite"></div>
  </section>

  <section class="score-card">
    <span>Punkte: <strong id="score">0</strong></span>
    <span>Aufgaben: <strong id="total">0</strong></span>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
